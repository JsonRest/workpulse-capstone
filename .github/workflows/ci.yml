name: WorkPulse CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install flake8 pytest numpy pandas scikit-learn xgboost
      - run: flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E302,E303,E226,E231
      - run: pytest tests/ -v --tb=short
